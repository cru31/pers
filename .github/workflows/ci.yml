name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        wgpu_method: [download, compile]
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
    
    - name: Setup Rust (for compile method)
      if: matrix.wgpu_method == 'compile'
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.82.0
    
    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          C:\vcpkg\installed
          C:\vcpkg\packages
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-
    
    - name: Cache wgpu-native runtime
      uses: actions/cache@v4
      with:
        path: third_party/wgpu-native-runtime
        key: ${{ runner.os }}-wgpu-${{ matrix.wgpu_method }}-v25.0.2.1
        restore-keys: |
          ${{ runner.os }}-wgpu-${{ matrix.wgpu_method }}-
    
    - name: Configure CMake (Download)
      if: matrix.wgpu_method == 'download'
      run: |
        cmake --preset=windows-${{ matrix.config }}-download
    
    - name: Configure CMake (Compile)
      if: matrix.wgpu_method == 'compile'
      run: |
        cmake --preset=windows-${{ matrix.config }}-compile
    
    - name: Build
      run: |
        $buildDir = if ("${{ matrix.wgpu_method }}" -eq "download") { "build/wgpu-prebuilt" } else { "build/wgpu-compile" }
        $configDir = "${{ matrix.config }}".ToLower()
        cmake --build "$buildDir/$configDir" --config ${{ matrix.config }} --parallel 4
    
    - name: Run Tests
      run: |
        $buildDir = if ("${{ matrix.wgpu_method }}" -eq "download") { "build/wgpu-prebuilt" } else { "build/wgpu-compile" }
        $configDir = "${{ matrix.config }}".ToLower()
        ctest --test-dir "$buildDir/$configDir" -C ${{ matrix.config }} --output-on-failure
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-${{ matrix.config }}-${{ matrix.wgpu_method }}
        path: |
          build/*/bin/${{ matrix.config }}/*.exe
          build/*/bin/${{ matrix.config }}/*.dll
          build/*/lib/${{ matrix.config }}/*.lib

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        wgpu_method: [download, compile]
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          pkg-config
    
    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git $HOME/vcpkg
        $HOME/vcpkg/bootstrap-vcpkg.sh
        echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
    
    - name: Setup Rust (for compile method)
      if: matrix.wgpu_method == 'compile'
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.82.0
    
    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ~/vcpkg/installed
          ~/vcpkg/packages
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-
    
    - name: Cache wgpu-native runtime
      uses: actions/cache@v4
      with:
        path: third_party/wgpu-native-runtime
        key: ${{ runner.os }}-wgpu-${{ matrix.wgpu_method }}-v25.0.2.1
        restore-keys: |
          ${{ runner.os }}-wgpu-${{ matrix.wgpu_method }}-
    
    - name: Configure CMake
      run: |
        if [ "${{ matrix.wgpu_method }}" = "download" ]; then
          FORCE_DOWNLOAD="-DFORCE_WGPU_DOWNLOAD=ON"
          BUILD_DIR="build/wgpu-prebuilt"
        else
          FORCE_COMPILE="-DFORCE_WGPU_COMPILE=ON"
          BUILD_DIR="build/wgpu-compile"
        fi
        
        cmake -B $BUILD_DIR/${{ matrix.config }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
          -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_MANIFEST_FEATURES="tests" \
          -DBUILD_TESTS=ON \
          $FORCE_DOWNLOAD $FORCE_COMPILE \
          -G Ninja
    
    - name: Build
      run: |
        if [ "${{ matrix.wgpu_method }}" = "download" ]; then
          BUILD_DIR="build/wgpu-prebuilt"
        else
          BUILD_DIR="build/wgpu-compile"
        fi
        cmake --build $BUILD_DIR/${{ matrix.config }} --parallel 4
    
    - name: Run Tests
      run: |
        if [ "${{ matrix.wgpu_method }}" = "download" ]; then
          BUILD_DIR="build/wgpu-prebuilt"
        else
          BUILD_DIR="build/wgpu-compile"
        fi
        ctest --test-dir $BUILD_DIR/${{ matrix.config }} --output-on-failure
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-${{ matrix.config }}-${{ matrix.wgpu_method }}
        path: |
          build/*/bin/*
          build/*/lib/*.so
          build/*/lib/*.a

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        wgpu_method: [download, compile]
    

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
        config: [core-only, with-tests]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '6ecbbbdf31cba47aafa7cf6189b1e73e10ac61f8'
        vcpkgJsonGlob: '**/vcpkg.json'
    
    - name: Install Rust (50% chance to test source build)
      if: hashFiles('**/vcpkg.json') != '' && matrix.build_type == 'Release'
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.79.0
    
    - name: Configure CMake (Core Only)
      if: matrix.config == 'core-only'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DBUILD_TESTS=OFF \
          -DBUILD_SAMPLES=OFF
      shell: bash
    
    - name: Configure CMake (With Tests and GLFW)
      if: matrix.config == 'with-tests'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_MANIFEST_FEATURES="tests" \
          -DBUILD_TESTS=ON \
          -DBUILD_SAMPLES=OFF
      shell: bash
    
    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}
    
    - name: List build outputs
      run: |
        echo "=== Build output structure ==="
        ls -la build/ || dir build\
        echo "=== Libraries ==="
        ls -la build/lib/ || dir build\lib
        echo "=== Binaries ==="
        ls -la build/bin/ || dir build\bin
      shell: bash
      continue-on-error: true
    
    - name: Test
      if: matrix.config == 'with-tests'
      working-directory: build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure
    
    - name: Run WebGPU Test
      if: matrix.config == 'with-tests'
      run: |
        if [ -f "build/bin/${{ matrix.build_type }}/test_pers_webgpu" ]; then
          ./build/bin/${{ matrix.build_type }}/test_pers_webgpu
        elif [ -f "build/bin/${{ matrix.build_type }}/test_pers_webgpu.exe" ]; then
          ./build/bin/${{ matrix.build_type }}/test_pers_webgpu.exe
        elif [ -f "build/bin/test_pers_webgpu" ]; then
          ./build/bin/test_pers_webgpu
        fi
      shell: bash
      continue-on-error: true